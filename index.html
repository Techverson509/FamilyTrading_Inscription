<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamilyTrading Real — Fòmilè Enskripsyon</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap');
  
  :root {
    --navy:#0D1B2A; --navy2:#162B3F; --gold:#F4A261; --gold2:#E8914F;
    --teal:#1AA389; --red:#CC0000; --white:#FFFFFF; --gray:#D0D8E8;
    --light:#F4F7FA; --text:#1A202C;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { 
    background: var(--navy); 
    font-family: 'Outfit', sans-serif; 
    color: var(--white); 
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 10% 20%, rgba(244,162,97,0.05) 0%, transparent 50%);
  }

  .container { max-width: 600px; margin: 40px auto; padding: 20px; }
  .form-container { 
    background: var(--navy2); 
    padding: 30px; 
    border-radius: 20px; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
  }

  h2 { font-family: 'Bebas Neue', cursive; font-size: 2.5rem; color: var(--gold); margin-bottom: 20px; text-align: center; letter-spacing: 1px; }

  .input-group { margin-bottom: 20px; position: relative; }
  label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 500; color: var(--gray); }
  
  input, select, textarea {
    width: 100%; padding: 14px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05); color: white; font-size: 1rem; transition: 0.3s;
  }

  /* Validasyon vizyèl */
  input:focus { border-color: var(--gold); outline: none; background: rgba(255,255,255,0.1); }
  input:valid:not(:placeholder-shown) { border-color: var(--teal); }
  input:invalid:not(:placeholder-shown) { border-color: var(--red); }

  .btn-main {
    width: 100%; padding: 16px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: var(--navy); font-weight: 800; font-size: 1.1rem; cursor: pointer;
    transition: 0.3s; margin-top: 20px; display: flex; justify-content: center; align-items: center;
  }
  .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(244,162,97,0.3); }
  .btn-main:disabled { background: #666; cursor: not-allowed; transform: none; }

  /* Spinner */
  .spinner {
    display: none; width: 22px; height: 22px; border: 3px solid rgba(13,27,42,0.3);
    border-radius: 50%; border-top-color: var(--navy);
    animation: spin 1s linear infinite; margin-left: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #successScreen { display: none; text-align: center; padding: 40px 20px; }
  .success-icon { font-size: 80px; color: var(--teal); margin-bottom: 20px; }
</style>
</head>
<body>

<div class="container">
  <div id="formArea" class="form-container">
    <h2>INSCRIPTION PRO</h2>
    <form id="formEnskripsyon">
      <div class="input-group">
        <label>Nom Complet</label>
        <input type="text" id="nom" name="user_name" placeholder="John Doe" required>
      </div>
      
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" name="user_email" placeholder="john@example.com" required>
      </div>

      <div class="input-group">
        <label>Téléphone (WhatsApp)</label>
        <input type="tel" id="tel" name="user_tel" placeholder="+509 0000-0000" required>
      </div>

      <div class="input-group">
        <label>Méthode de Paiement</label>
        <select id="paymentMethod" name="payment_method" required>
          <option value="MonCash">MonCash</option>
          <option value="Zelle">Zelle</option>
          <option value="Crypto">Crypto (USDT)</option>
        </select>
      </div>

      <div class="input-group">
        <label>ID Transaction / Référence</label>
        <input type="text" id="paymentId" name="payment_id" placeholder="Ex: 5TG89..." required>
      </div>

      <button type="submit" id="btnSubmit" class="btn-main">
        <span id="btnText">S'inscrire Maintenant</span>
        <div id="loader" class="spinner"></div>
      </button>
    </form>
  </div>

  <div id="successScreen" class="form-container">
    <div class="success-icon">✓</div>
    <h2>Félicitations !</h2>
    <p style="margin-bottom: 20px; color: var(--gray);">Votre inscription a été envoyée avec succès.</p>
    <p style="font-size: 0.9rem; color: var(--gold);">Votre reçu se télécharge automatiquement...</p>
    <button onclick="location.reload()" class="btn-main" style="background: var(--navy2); color: white; border: 1px solid var(--gold); margin-top: 30px;">Nouvelle Enscription</button>
  </div>
</div>

<script>
  (function() {
    // RANPLACE SA AK PWÒP PUBLIC KEY EMAILJS OU
    emailjs.init("YOUR_PUBLIC_KEY");
  })();

  const form = document.getElementById('formEnskripsyon');
  const btnSubmit = document.getElementById('btnSubmit');
  const btnText = document.getElementById('btnText');
  const loader = document.getElementById('loader');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    // 1. Montre Loader
    btnSubmit.disabled = true;
    loader.style.display = 'block';
    btnText.textContent = "Traitement...";

    // 2. Voye Imèl la via EmailJS
    // Ranplase 'YOUR_SERVICE_ID' ak 'YOUR_TEMPLATE_ID'
    emailjs.sendForm('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', this)
      .then(() => {
        // 3. Si sa mache, jenere PDF a
        generatePDF();
        
        // 4. Montre ekran siksè
        document.getElementById('formArea').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';
      }, (error) => {
        alert("Erreur d'envoi: " + JSON.stringify(error));
        btnSubmit.disabled = false;
        loader.style.display = 'none';
        btnText.textContent = "S'inscrire Maintenant";
      });
  });

  function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    const nom = document.getElementById('nom').value;
    const email = document.getElementById('email').value;
    const tel = document.getElementById('tel').value;
    const methode = document.getElementById('paymentMethod').value;
    const ref = document.getElementById('paymentId').value;
    const date = new Date().toLocaleString();

    // Design Resi a
    doc.setFillColor(13, 27, 42);
    doc.rect(0, 0, 210, 40, 'F');
    
    doc.setTextColor(244, 162, 97);
    doc.setFontSize(22);
    doc.text("FAMILY TRADING REAL", 105, 25, { align: "center" });

    doc.setTextColor(0, 0, 0);
    doc.setFontSize(16);
    doc.text("REÇU D'INSCRIPTION", 20, 60);
    
    doc.setFontSize(12);
    doc.text(`Date: ${date}`, 20, 70);
    doc.line(20, 75, 190, 75);

    doc.text(`Nom: ${nom}`, 20, 90);
    doc.text(`Email: ${email}`, 20, 100);
    doc.text(`Téléphone: ${tel}`, 20, 110);
    doc.text(`Méthode: ${methode}`, 20, 120);
    doc.text(`Référence: ${ref}`, 20, 130);

    doc.setFillColor(244, 162, 97);
    doc.rect(20, 150, 170, 15, 'F');
    doc.setTextColor(255, 255, 255);
    doc.text("STATUT: EN ATTENTE DE VALIDATION", 105, 160, { align: "center" });

    doc.setTextColor(100, 100, 100);
    doc.setFontSize(10);
    doc.text("Merci de votre confiance. Notre équipe vous contactera sous peu.", 105, 185, { align: "center" });

    // Telechaje PDF a otomatikman
    doc.save(`Recu_${nom.replace(/\s+/g, '_')}.pdf`);
  }
</script>

</body>
</html>
